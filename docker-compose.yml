version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ssp_dashboard_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=ssp_dashboard
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ssp_dashboard_redis
    ports:
      - "6379:6379"
    # Persistência opcional: salva snapshot a cada 60s se houver ao menos 1 mudança
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - ./.docker/redisdata:/data
    restart: unless-stopped
