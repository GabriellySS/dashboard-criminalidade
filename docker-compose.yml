version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ssp_dashboard_db
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=admin
      - POSTGRES_DB=ssp_dashboard
    ports:
      - "5432:5432"
    volumes:
      - ./.docker/pgdata:/var/lib/postgresql/data
    restart: unless-stopped
